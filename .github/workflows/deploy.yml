name: Deploy to VPS

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen --extra dev --python 3.14
      - name: Run Ruff format check
        run: uv run ruff format --check api blog core editor sender shiftedblog team manage.py templates
      - name: Run Ruff lint
        run: uv run ruff check --ignore RUF001 api blog core editor sender shiftedblog team manage.py templates
      - name: Run Pyright
        run: uv run pyright api blog core editor sender shiftedblog team manage.py
      - name: Run Bandit
        run: >
          uv run bandit -c pyproject.toml -r blog core editor sender shiftedblog team
          -ll -x '**/migrations/*'
      - name: Run pip-audit
        run: uv run pip-audit

  editor-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: editor-ui/package.json
      - name: Install, build, and test editor-ui
        working-directory: editor-ui
        run: |
          npm install
          npm run typecheck
          npm run build
          npx playwright install --with-deps chromium
          npm run test:e2e

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, editor-ui]
    if: github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Install Doppler CLI
      uses: dopplerhq/cli-action@v4

    - name: Fetch Doppler Secrets
      uses: dopplerhq/cli-action@v4
      with:
          token: ${{ secrets.DOPPLER_TOKEN }}
          project: shifted_blog
          config: prd
          command: secrets download --no-file --format=env > secrets.env

    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          echo "Current directory: $(pwd)"
          echo "Docker version: $(docker --version)"
          echo "Docker compose version: $(docker compose version)"

          # Navigate to correct project directory
          cd /opt/shiftedblog
          echo "Project directory: $(pwd)"
          ls -la
          
          # Pull latest changes
          git pull origin master

          # Install Doppler CLI if not available
          if ! command -v doppler &> /dev/null; then
            echo "Installing Doppler CLI..."
            curl -Ls https://cli.doppler.com/install.sh | sh
            export PATH="$HOME/.local/bin:$PATH"
          fi
          
          # Set up Doppler authentication
          echo "${{ secrets.DOPPLER_TOKEN }}" | doppler configure set token
          
          # secrets.env is passed to containers via env_file; avoid .env in project root
          # because Compose auto-interpolates it and breaks values containing $ (e.g. passwords).
          doppler secrets download --no-file --format=env > secrets.env
          rm -f .env
          
          # Verify secrets.env was created
          echo "Checking secrets.env file:"
          ls -la secrets.env
          echo "File size: $(wc -c < secrets.env)"
          echo "First few lines of secrets.env (without values):"
          head -5 secrets.env | sed 's/=.*/=***/'
          
          # Ensure writable bind-mount dirs exist before containers start
          mkdir -p logs backups static media static_blog
          chown -R 1000:1000 logs backups static media 2>/dev/null || chmod -R a+rwX logs backups static media

          # Stop existing containers
          docker compose -f docker-compose.prod.yml down || echo "No containers to stop"

          # Free disk before build (small VPS fills up with old images/build cache)
          docker builder prune -af || true
          docker image prune -af || true
          df -h / /var/lib/docker 2>/dev/null || df -h /

          # Build and start (layer cache keeps disk use lower than --no-cache)
          docker compose -f docker-compose.prod.yml build
          docker compose -f docker-compose.prod.yml up -d
          
          # Verify deployment
          echo "Running containers:"
          docker ps
          
          # Check logs if needed
          echo "Container logs:"
          docker compose -f docker-compose.prod.yml logs --tail=20

    - name: Verify Deployment
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: docker ps
